version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: admanage_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admanage
      POSTGRES_PASSWORD: admanage_secret
      POSTGRES_DB: admanage
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admanage']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: admanage_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://admanage:admanage_secret@postgres:5432/admanage
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
